name: Update GNAF Data

on:
  schedule:
    # GNAF releases quarterly — run on the 15th of Feb, May, Aug, Nov
    - cron: '0 0 15 2,5,8,11 *'
  workflow_dispatch:
    inputs:
      shard_prefix_length:
        description: 'Shard prefix length (hex chars)'
        required: false
        default: '3'
      datum:
        description: 'Coordinate datum (GDA94 or GDA2020)'
        required: false
        default: 'GDA2020'

permissions:
  contents: write

env:
  NODE_OPTIONS: '--max-old-space-size=4096'
  SHARD_PREFIX_LENGTH: ${{ github.event.inputs.shard_prefix_length || '3' }}
  GNAF_DATUM: ${{ github.event.inputs.datum || 'GDA2020' }}

jobs:
  # ── Stage 1: Download GNAF and import into DuckDB ──────────────────────
  build-db:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get latest GNAF version from CKAN
        id: gnaf-version
        run: |
          RESOURCE_NAME=$(curl -sf 'https://data.gov.au/data/api/3/action/package_show?id=geocoded-national-address-file-g-naf' \
            | jq -r --arg DATUM "$GNAF_DATUM" \
              '.result.resources | map(select(.format == "ZIP" and .state == "active")) | sort_by(.last_modified // .created) | reverse | map(select(.name | ascii_upcase | contains($DATUM))) | first | .name')
          echo "resource_name=$RESOURCE_NAME"
          CACHE_KEY=$(echo "$RESOURCE_NAME" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
          echo "cache_key=gnaf-zip-${CACHE_KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore GNAF ZIP cache
        uses: actions/cache/restore@v4
        with:
          path: data/gnaf.zip
          key: ${{ steps.gnaf-version.outputs.cache_key }}

      - name: Download GNAF data
        run: npm run pipeline:download

      - name: Save GNAF ZIP cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/gnaf.zip
          key: ${{ steps.gnaf-version.outputs.cache_key }}

      - name: Import into DuckDB
        run: npm run pipeline:import

      - name: Upload DuckDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gnaf-duckdb
          path: data/gnaf.duckdb
          retention-days: 1
          compression-level: 1

  # ── Stage 2a: Generate address + lot/DP shards (parallel) ──────────────
  shard:
    needs: build-db
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download DuckDB artifact
        uses: actions/download-artifact@v4
        with:
          name: gnaf-duckdb
          path: data

      - name: Shard data
        run: npm run pipeline:shard

      - name: Upload shard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnaf-shards
          path: |
            data/shards/addresses/
            data/shards/lotdp/
            data/shards/metadata.json
          retention-days: 1
          compression-level: 1

  # ── Stage 2b: Generate street shards + D1 search index (parallel) ──────
  search-index:
    needs: build-db
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download DuckDB artifact
        uses: actions/download-artifact@v4
        with:
          name: gnaf-duckdb
          path: data

      - name: Generate search index
        run: npm run pipeline:search-index

      - name: Upload search index artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnaf-search-index
          path: |
            data/shards/streets/
            data/shards/search-index/
          retention-days: 1
          compression-level: 1

  # ── Stage 3: Release, upload to S3, import D1 ─────────────────────────
  release:
    needs: [shard, search-index]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          name: gnaf-shards
          path: data/shards

      - name: Download search index artifacts
        uses: actions/download-artifact@v4
        with:
          name: gnaf-search-index
          path: data/shards

      - name: Read metadata
        id: meta
        run: |
          VERSION=$(jq -r .version data/shards/metadata.json)
          DATE=$(jq -r .date data/shards/metadata.json)
          TOTAL=$(jq -r .totalAddresses data/shards/metadata.json)
          DATUM=$(jq -r .datum data/shards/metadata.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "datum=$DATUM" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: tar -cf gnaf-shards-${{ steps.meta.outputs.version }}.tar -C data/shards .

      - name: Create release notes
        run: |
          cat > release-notes.md <<EOF
          ## GNAF Sharded Data

          - **Version**: ${{ steps.meta.outputs.version }}
          - **Datum**: ${{ steps.meta.outputs.datum }}
          - **Total addresses**: ${{ steps.meta.outputs.total }}
          - **Built**: ${{ steps.meta.outputs.date }}
          - **Shard prefix length**: ${{ env.SHARD_PREFIX_LENGTH }}

          ### Contents

          The archive contains pre-processed, hash-sharded GNAF address data ready to upload to any S3-compatible object storage.

          \`\`\`
          addresses/      # Address shards (gzipped JSON, keyed by GNAF PID)
          lotdp/          # Lot/DP index shards (gzipped JSON, mapping lot/DP -> GNAF PIDs)
          streets/        # Street shards (gzipped JSON, keyed by street key)
          search-index/   # D1 SQL chunks for street search index
          metadata.json   # Version, counts, and configuration
          \`\`\`

          ### Usage

          1. Download and extract the archive
          2. Upload the contents to your S3-compatible bucket under \`gnaf/${{ steps.meta.outputs.version }}/\`
          3. Create a \`gnaf/latest.json\` pointer: \`{"version": "${{ steps.meta.outputs.version }}"}\`
          4. Configure the worker with your S3 endpoint and bucket

          See the [README](https://github.com/${{ github.repository }}#using-pre-built-data) for details.

          ---

          GNAF data is provided by the Australian Government under the [End User Licence Agreement](https://data.gov.au/dataset/geocoded-national-address-file-g-naf).
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.version }}" \
            --title "GNAF ${{ steps.meta.outputs.version }}" \
            --notes-file release-notes.md \
            gnaf-shards-${{ steps.meta.outputs.version }}.tar

      - name: Upload to S3
        run: npm run pipeline:upload
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

      - name: Upload search index to D1
        run: |
          for f in data/shards/search-index/*.sql; do
            echo "Executing $f..."
            npx wrangler d1 execute gnaf-search --remote --file="$f"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Delete artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            gnaf-duckdb
            gnaf-shards
            gnaf-search-index
