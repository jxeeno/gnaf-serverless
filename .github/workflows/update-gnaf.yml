name: Update GNAF Data

on:
  schedule:
    # GNAF releases quarterly — run on the 15th of Feb, May, Aug, Nov
    - cron: '0 0 15 2,5,8,11 *'
  workflow_dispatch:
    inputs:
      shard_prefix_length:
        description: 'Shard prefix length (hex chars)'
        required: false
        default: '3'
      datum:
        description: 'Coordinate datum (GDA94 or GDA2020)'
        required: false
        default: 'GDA2020'

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run GNAF pipeline
        run: npm run pipeline:run
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          SHARD_PREFIX_LENGTH: ${{ github.event.inputs.shard_prefix_length || '3' }}
          GNAF_DATUM: ${{ github.event.inputs.datum || 'GDA2020' }}
